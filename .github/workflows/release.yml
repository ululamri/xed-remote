name: Release Extension

# Publishes a permanent GitHub Release with the extension zip attached.
# Trigger by pushing a version tag from Termux, e.g.:
#   git tag v1.0.0
#   git push origin v1.0.0

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Make scripts executable
        run: chmod +x ./gradlew ./compileRelease

      - name: Compile Release
        run: ./compileRelease

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: output/*.zip
          generate_release_notes: true
